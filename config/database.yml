
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: edu
  password: edu
  host: localhost


development:
  <<: *default
  database: website_development
  <<: *default
  database: website_test


production:
  primary: &primary_production
    <<: *default
    database: website_production
    username: website
    password: <%= ENV["WEBSITE_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: website_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: website_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: website_production_cable
    migrations_paths: db/cable_migrate
